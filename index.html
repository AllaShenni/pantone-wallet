<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pantone Wallet - Premium Edition</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="./icons/icon.svg">
    <link rel="apple-touch-icon" href="./icons/icon.svg">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="close-app-btn" onclick="window.close();" title="Закрыть">✕</div>
    <div class="container">
        <!-- Кнопка "Установить на рабочий стол" (только для браузера) -->
        <div id="install-banner" class="install-banner" style="display: none;">
            <button id="install-button" class="install-button">
                <svg class="install-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 3v13M7 11l5 5 5-5" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M4 20h16" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
                </svg>
                Скачать на Рабочий стол
            </button>
        </div>

        <div id="wallet" class="wallet closed">
            <!-- Внутренняя часть (Содержимое) -->
            <div class="wallet-body">
                <div class="converter-wrapper vertical">
                    <!-- Блок 1: У меня есть -->
                    <div class="converter-section top">
                        <div class="section-label">У меня есть</div>
                        <div class="currency-tabs" id="have-tabs">
                            <button class="tab active" data-currency="RUB">RUB</button>
                            <button class="tab" data-currency="USD">USD</button>
                            <button class="tab" data-currency="EUR">EUR</button>
                            <div class="tab-more dynamic-slot tab" id="have-dynamic-container" data-currency="DZD">
                                <span id="have-dynamic-label">DZD</span>
                                <select id="have-more-select">
                                    <option value="DZD">DZD</option>
                                    <option value="CNY">CNY</option>
                                    <option value="JPY">JPY</option>
                                    <option value="GBP">GBP</option>
                                    <option value="CHF">CHF</option>
                                    <option value="CAD">CAD</option>
                                    <option value="AUD">AUD</option>
                                    <option value="KZT">KZT</option>
                                    <option value="BYN">BYN</option>
                                </select>
                            </div>
                        </div>
                        <div class="input-container">
                            <div class="input-row">
                                <input type="number" id="have-amount" value="3.14" step="0.01" placeholder="0.00">
                            </div>
                            <div class="rate-info" id="have-rate-info">1 RUB = 1.0000 RUB</div>
                        </div>
                        <!-- Иконка обмена внизу верхней карты по центру -->
                        <div class="swap-icon-vertical" onclick="calculate('want'); event.stopPropagation();"></div>
                    </div>

                    <!-- Блок 2: Хочу приобрести -->
                    <div class="converter-section bottom">
                        <div class="section-label">Хочу приобрести</div>
                        <div class="currency-tabs" id="want-tabs">
                            <button class="tab" data-currency="RUB">RUB</button>
                            <button class="tab active" data-currency="USD">USD</button>
                            <button class="tab" data-currency="EUR">EUR</button>
                            <div class="tab-more dynamic-slot tab" id="want-dynamic-container" data-currency="DZD">
                                <span id="want-dynamic-label">DZD</span>
                                <select id="want-more-select">
                                    <option value="DZD">DZD</option>
                                    <option value="CNY">CNY</option>
                                    <option value="JPY">JPY</option>
                                    <option value="GBP">GBP</option>
                                    <option value="CHF">CHF</option>
                                    <option value="CAD">CAD</option>
                                    <option value="AUD">AUD</option>
                                    <option value="KZT">KZT</option>
                                    <option value="BYN">BYN</option>
                                </select>
                            </div>
                        </div>
                        <div class="input-container">
                            <div class="input-row">
                                <input type="number" id="want-amount" step="0.01" placeholder="0.00">
                            </div>
                            <div class="rate-info" id="want-rate-info">1 USD = -- RUB</div>
                        </div>
                        <!-- Никнейм внизу нижней карты -->
                        <div class="footer-card">
                            <a href="https://t.me/AllaShenni" target="_blank" class="dev-nickname" onclick="event.stopPropagation();" title="Telegram автора">@AllaShenni</a>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Лицевая сторона (Крышка на петлях) -->
            <div class="wallet-cover-hinge">
                <div class="rbc-icon-circle" onclick="window.open('https://cash.rbc.ru/converter.html', '_blank'); event.stopPropagation();" title="Перейти на РБК">
                    <div class="circle-border">
                        <div class="icon-grid-white">
                            <span>$</span><span>¥</span>
                            <span>€</span><span>₽</span>
                        </div>
                    </div>
                </div>
                <div class="gold-bars-stack">
                    <div class="gold-bar bar-1"></div>
                    <div class="gold-bar bar-2"></div>
                    <div class="gold-bar bar-3"></div>
                </div>
                <div class="wallet-title">КОНВЕРТЕР ВАЛЮТ</div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
