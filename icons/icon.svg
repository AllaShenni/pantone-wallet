<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="cover" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B88A75"/>
      <stop offset="50%" stop-color="#A47864"/>
      <stop offset="100%" stop-color="#8A6450"/>
    </linearGradient>

    <linearGradient id="goldBody" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#fff5b8"/>
      <stop offset="20%" stop-color="#ffe57a"/>
      <stop offset="55%" stop-color="#f0c434"/>
      <stop offset="100%" stop-color="#c9961f"/>
    </linearGradient>

    <linearGradient id="goldShine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(255,255,255,0)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0.55)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>

    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#3a3a3a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>

    <filter id="coverShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="10" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.55"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="barShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.5"/>
      <feOffset dx="2" dy="4" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.55"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <symbol id="goldBar" viewBox="0 0 60 100">
      <rect x="2" y="2" width="56" height="96" rx="6" fill="url(#goldBody)" stroke="rgba(120,80,10,0.5)" stroke-width="1"/>
      <rect x="6" y="6" width="48" height="88" rx="3" fill="none" stroke="rgba(180,130,20,0.55)" stroke-width="0.8"/>
      <rect x="8" y="10" width="44" height="22" rx="2" fill="url(#goldShine)"/>
      <rect x="2" y="2" width="56" height="96" rx="6" fill="none" stroke="rgba(255,245,184,0.6)" stroke-width="0.6"/>
    </symbol>
  </defs>

  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <g filter="url(#coverShadow)">
    <rect x="116" y="56" width="280" height="400" rx="32" fill="url(#cover)" stroke="rgba(0,0,0,0.25)" stroke-width="3"/>

    <circle cx="340" cy="120" r="32" fill="none" stroke="rgba(255,255,255,0.95)" stroke-width="4"/>
    <text x="340" y="115" text-anchor="middle" fill="white" font-family="serif" font-weight="bold" font-size="18">$ ¥</text>
    <text x="340" y="138" text-anchor="middle" fill="white" font-family="serif" font-weight="bold" font-size="18">€ ₽</text>

    <g filter="url(#barShadow)" transform="translate(256, 290)">
      <use href="#goldBar" x="10"  y="-65" width="62" height="115"/>
      <use href="#goldBar" x="-32" y="-40" width="50" height="90"/>
      <use href="#goldBar" x="-66" y="-20" width="40" height="70"/>
    </g>

    <text x="256" y="395" text-anchor="middle" fill="rgba(0,0,0,0.55)" font-family="Georgia, serif" font-weight="bold" font-size="22" letter-spacing="2">КОНВЕРТЕР</text>
    <text x="256" y="423" text-anchor="middle" fill="rgba(0,0,0,0.55)" font-family="Georgia, serif" font-weight="bold" font-size="22" letter-spacing="2">ВАЛЮТ</text>
  </g>
</svg>
