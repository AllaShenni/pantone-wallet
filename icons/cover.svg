<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360">
  <defs>
    <linearGradient id="cover" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B88A75"/>
      <stop offset="50%" stop-color="#A47864"/>
      <stop offset="100%" stop-color="#8A6450"/>
    </linearGradient>

    <linearGradient id="goldBody" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#fff5b8"/>
      <stop offset="20%" stop-color="#ffe57a"/>
      <stop offset="55%" stop-color="#f0c434"/>
      <stop offset="100%" stop-color="#c9961f"/>
    </linearGradient>

    <linearGradient id="goldShine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(255,255,255,0)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0.55)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>

    <linearGradient id="goldText" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff5b8"/>
      <stop offset="100%" stop-color="#c9961f"/>
    </linearGradient>

    <radialGradient id="bg" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#3a3a3a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>

    <filter id="coverShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="8" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.55"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="barShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="2" dy="3" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.55"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <symbol id="goldBar" viewBox="0 0 60 100">
      <rect x="2" y="2" width="56" height="96" rx="6" fill="url(#goldBody)" stroke="rgba(120,80,10,0.5)" stroke-width="1"/>
      <rect x="6" y="6" width="48" height="88" rx="3" fill="none" stroke="rgba(180,130,20,0.55)" stroke-width="0.8"/>
      <rect x="8" y="10" width="44" height="22" rx="2" fill="url(#goldShine)"/>
      <rect x="2" y="2" width="56" height="96" rx="6" fill="none" stroke="rgba(255,245,184,0.6)" stroke-width="0.6"/>
    </symbol>
  </defs>

  <!-- Background -->
  <rect width="640" height="360" fill="url(#bg)"/>

  <!-- Wallet card (left side) -->
  <g filter="url(#coverShadow)" transform="translate(40, 40)">
    <rect x="0" y="0" width="220" height="280" rx="20" fill="url(#cover)" stroke="rgba(0,0,0,0.25)" stroke-width="2"/>

    <!-- Currency circle -->
    <circle cx="180" cy="50" r="24" fill="none" stroke="rgba(255,255,255,0.95)" stroke-width="3"/>
    <text x="180" y="46" text-anchor="middle" fill="white" font-family="Georgia, serif" font-weight="bold" font-size="13">$ ¥</text>
    <text x="180" y="62" text-anchor="middle" fill="white" font-family="Georgia, serif" font-weight="bold" font-size="13">€ ₽</text>

    <!-- Gold bars -->
    <g filter="url(#barShadow)" transform="translate(110, 175)">
      <use href="#goldBar" x="6"   y="-45" width="48" height="90"/>
      <use href="#goldBar" x="-26" y="-28" width="40" height="72"/>
      <use href="#goldBar" x="-54" y="-12" width="32" height="56"/>
    </g>

    <!-- Card title -->
    <text x="110" y="240" text-anchor="middle" fill="rgba(0,0,0,0.6)" font-family="Georgia, serif" font-weight="bold" font-size="15" letter-spacing="1.5">КОНВЕРТЕР</text>
    <text x="110" y="262" text-anchor="middle" fill="rgba(0,0,0,0.6)" font-family="Georgia, serif" font-weight="bold" font-size="15" letter-spacing="1.5">ВАЛЮТ</text>
  </g>

  <!-- Right side text -->
  <g transform="translate(310, 100)">
    <text x="0" y="0" fill="#F0F0F0" font-family="Georgia, serif" font-weight="bold" font-size="56" letter-spacing="2">Pantone</text>
    <text x="0" y="64" fill="url(#goldText)" font-family="Georgia, serif" font-weight="bold" font-size="56" letter-spacing="2">Wallet</text>
    <text x="2" y="110" fill="rgba(255,255,255,0.7)" font-family="Georgia, serif" font-size="18" letter-spacing="1">Конвертер валют</text>
    <text x="2" y="138" fill="rgba(240,196,52,0.8)" font-family="Georgia, serif" font-style="italic" font-size="14" letter-spacing="0.5">в цветах года Pantone</text>
  </g>

  <!-- Author tag bottom right -->
  <text x="612" y="340" text-anchor="end" fill="rgba(255,255,255,0.4)" font-family="Georgia, serif" font-size="11" letter-spacing="0.5">@AllaShenni</text>
</svg>
